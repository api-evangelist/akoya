specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Akoya
providerId: akoya
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - Open Banking
  - US
  - FinOps
  - FOCUS
description: >-
  FinOps view of Akoya. Network-membership commercial model. Cost lines are network membership,
  per-call / per-consumer fees on the recipient side, and reciprocal fee schedules on the
  data-provider side. FDX-standard data shape eases consumer migration between providers.
sources:
  - https://akoya.com/
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Akoya LLC
serviceCategory: Open Banking
billingModel:
  pricingCategory: Custom Network Contract
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Subscription
    - Usage
    - Adjustment
focusColumns:
  ServiceName: Akoya Data Access Network
  ServiceCategory: Open Banking
  ProviderName: Akoya LLC
  PublisherName: Akoya LLC
  InvoiceIssuerName: Akoya LLC
  BillingCurrency: USD
  ChargeCategory: Subscription
meters:
  - name: network_membership
    description: Network membership subscription.
    unit: month
    aggregation: sum
    dimensions:
      - client
  - name: api_call
    description: Per-call usage fee.
    unit: call
    aggregation: sum
    dimensions:
      - client
      - data_provider
  - name: consented_consumer
    description: Per consented consumer fee.
    unit: consumer_month
    aggregation: count_distinct
    dimensions:
      - end_user
principles:
  - name: Visibility
    description: Track per-data-provider call volume; reconcile against recipient invoice.
  - name: Allocation
    description: Allocate per consuming product; tag end-user IDs per cost center.
  - name: Optimization
    description: Cache infrequently changing endpoints (e.g. account details); reduce Transactions polls.
  - name: Accountability
    description: Assign a billing owner; review at renewal.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
