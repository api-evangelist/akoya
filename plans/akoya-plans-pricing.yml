specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Akoya
providerId: akoya
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - Open Banking
  - US
  - Plans
description: >-
  Akoya operates as a network where data recipients (fintechs) and data providers (banks) sign
  network agreements. Pricing is sales-led network membership plus per-call or per-consumer
  fees. A free Sandbox tier is available for developers.
notes: Akoya does not publish list pricing.
sources:
  - https://akoya.com/
  - https://docs.akoya.com/
plans:
  - id: akoya-sandbox
    name: Sandbox / Developer
    type: trial
    description: Free developer sandbox using fixture data providers.
    entries:
      - label: Subscription
        name: sandbox_subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: us
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Sandbox data providers
      - name: Full FDX endpoint surface
  - id: akoya-network-member
    name: Network Member (Production)
    type: enterprise
    description: Sales-led network membership plus per-call / per-consumer fees.
    entries:
      - label: Custom pricing
        name: network_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: contract
        geo: us
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Network membership
      - name: Per-call / per-consumer fees
      - name: Major US bank coverage
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
